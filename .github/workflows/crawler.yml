name: Hourly Crawler

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run crawler
        run: |
          cd backend
          python crawler.py

      - name: Recategorize misc news
        run: |
          cd backend
          echo "yes" | python recategorize_all.py --misc-only

      - name: Commit database changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/news.db
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto update news [skip ci]"
          git push

      - name: Warm up Render container
        run: |
          echo "Warming up Render container..."
          curl -s -m 60 https://news-aggregator-a1c7.onrender.com/api/categories > /dev/null || true
          echo "Container warmed up"

      - name: Create summary
        run: |
          echo "## Crawler Summary" >> $GITHUB_STEP_SUMMARY
          echo "News database updated successfully." >> $GITHUB_STEP_SUMMARY
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
